<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <div id="container">

        <svg>
            <line x1="0" x2="0" y1="0" y2="0" stroke-width="3" />
        </svg>

        <div id="left" class="side"></div>

        <div id="circles">
            <div class="circle" id="chrono">
                <div class="label">Chronosystem</div>
                <div class="circle" id="macro">
                    <div class="label">Macrosystem</div>
                    <div class="circle" id="exo">
                        <div class="label">Exosystem</div>
                        <div class="circle" id="meso">
                            <div class="label">Mesosystem</div>
                            <div class="circle" id="micro">
                                <div class="label">Microsystem</div>
                                <div class="circle" id="child">
                                    <div class="label">Individual Child</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="right" class="side"></div>
    </div>

    <div id="info">
        <button>Check answers</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
